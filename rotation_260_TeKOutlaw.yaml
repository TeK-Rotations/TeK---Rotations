version: 1
author: Tek
class: rogue
spec: 260
name: TeK's Kidneyspears outlaw
description: Only tabs to interrupt if enemies within 6 yards | M+ Affix Support
entry: main

movement_allowed: true

morphs:
  sinister_strike: ambush
  dispatch: coup_de_grace

config:
  mainhand_poison:
    label: "Main Hand Poison"
    type: dropdown
    default: 1
    options:
      - label: "Instant Poison"
        value: 1
      - label: "Deadly Poison"
        value: 2
      - label: "Wound Poison"
        value: 3

  offhand_poison:
    label: "Off Hand Poison"
    type: dropdown
    default: 1
    options:
      - label: "Crippling Poison"
        value: 1
      - label: "Numbing Poison"
        value: 2
      - label: "Atrophic Poison"
        value: 3

  auto_stealth:
    label: "Auto Stealth"
    type: checkbox
    default: true

  # === 12.0 ROLL THE BONES CONFIG ===
  rtb_reroll_stage:
    label: "RTB Reroll Stage"
    type: dropdown
    default: 1
    options:
      - label: "Stage 1 Only"
        value: 1
      - label: "No Buff Only"
        value: 0
    description: "Reroll at Stage 1 or only when no buff"

  keep_it_rolling_min_stage:
    label: "KIR Min Stage"
    type: dropdown
    default: 2
    options:
      - label: "Stage 2+"
        value: 2
      - label: "Stage 3+"
        value: 3
      - label: "Stage 4 Only"
        value: 4
    description: "Minimum stage to use Keep It Rolling"

  # === HERO TALENT SELECTION ===
  hero_tree:
    label: "Hero Talent Tree"
    type: dropdown
    default: 1
    options:
      - label: "Fatebound"
        value: 1
      - label: "Trickster"
        value: 2

  auto_defensives:
    label: "Auto Defensives"
    type: checkbox
    default: true
    description: "Automatically use defensive abilities"

  crimson_vial_hp:
    label: "Crimson Vial HP %"
    type: slider
    min: 20
    max: 80
    default: 50
    description: "Use Crimson Vial when health drops below this %"

  interrupt_timing_min:
    label: "Interrupt Delay Min (ms)"
    type: slider
    min: 0
    max: 500
    default: 100
    description: "Minimum delay before interrupt (humanization)"

  interrupt_timing_max:
    label: "Interrupt Delay Max (ms)"
    type: slider
    min: 100
    max: 1000
    default: 400
    description: "Maximum delay before interrupt (humanization)"

  # === M+ AFFIX CONFIG ===
  affix_handling:
    label: "Auto Affix Handling"
    type: checkbox
    default: true
    description: "Automatically handle M+ affixes (Voidbound, Ascendant)"

  features:
    label: "Features"
    type: multi_select
    options:
      - label: "Auto Target Interrupts"
        value: 0
      - label: "Kidney Shot for Interrupts"
        value: 1
      - label: "Blind for Interrupts"
        value: 2
    default: [0,1,2]
    show_override: true

variables:
  # === TARGET STATE ===
  target_valid: target.exists&target.enemy&target.alive
  target_attackable: var.target_valid&target.range<=8
  enemies_in_melee: enemies.8y

  # === FEATURES FLAGS (matching Shaman pattern) ===
  auto_target: config.features.has(0)
  use_kidney: config.features.has(1)
  use_blind: config.features.has(2)

  # === M+ AFFIX ===
  affix_priority_mode: config.affix_handling&(target.name="Void Emissary"|(target.name="Ascendant Orb"&target.casting))

  # === 12.0 ROLL THE BONES ===
  rtb_stage: buff.roll_the_bones.stack
  rtb_up: buff.roll_the_bones.up

  # === HERO TALENT TREES ===
  hero_tree_fatebound: config.hero_tree=1
  hero_tree_trickster: config.hero_tree=2

  # === CORE COMBAT STATE ===
  adrenaline_rush_up: buff.adrenaline_rush.up
  bte_ready: cooldown.between_the_eyes.ready
  killing_spree_ready: cooldown.killing_spree.ready
  opportunity_up: buff.opportunity.up
  audacity_up: buff.audacity.up
  slice_and_dice_up: buff.slice_and_dice.up
  stealth_up: buff.stealth.up
  vanish_up: buff.vanish.up
  shadow_dance_up: buff.shadow_dance.up
  subterfuge_up: buff.subterfuge.up
  in_stealth: var.stealth_up|var.vanish_up|var.shadow_dance_up

  # === FINISHER CONDITION FROM SIMC ===
  finish_condition: combo_points>=combo_points.max-1-(var.hero_tree_fatebound&!var.bte_ready)

  # === HEALTH ===
  health_critical: player.health.pct<30

  # === INTERRUPT SYSTEM ===
  kick_ready: cooldown.kick.ready
  kidney_ready: cooldown.kidney_shot.ready
  blind_ready: cooldown.blind.ready
  enough_cp_for_kidney: combo_points>=4

  # Is current target casting something we can interrupt or stun
  target_is_kickable: target.incoming_cast.kickable.up
  target_is_stunnable: target.incoming_cast.stunnable.up
  target_needs_interrupt: target.incoming_cast.kickable.up|target.incoming_cast.stunnable.up

  # Is there ANY enemy nearby casting something we can deal with
  any_kickable_8y: incoming_cast.8y.kickable.up
  any_stunnable_8y: incoming_cast.8y.stunnable.up
  any_interrupt_8y: incoming_cast.8y.kickable.up|incoming_cast.8y.stunnable.up

  # Mouseover / Focus
  mouseover_kickable: mouseover.incoming_cast.kickable.up
  mouseover_stunnable: mouseover.incoming_cast.stunnable.up
  focus_kickable: focus.incoming_cast.kickable.up
  focus_stunnable: focus.incoming_cast.stunnable.up

  # === POISON STATE ===
  mainhand_poison_up: buff.instant_poison.up|buff.deadly_poison.up|buff.wound_poison.up
  offhand_poison_up: buff.crippling_poison.up|buff.numbing_poison.up|buff.atrophic_poison.up

  # === AOE ===
  aoe_active: active_enemies>1

lists:

  spell_queue:
    - queue_spell

  sanity_checks:
    - return,if=player.dead
    - return,if=mounted
    - return,if=!state.rotation
    - return,if=state.blocked_inputs
    - return,if=player.loot_nearby

  combat_checks:
    - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
    - return,if=!target.valid&config.auto_combat.has(0)

  # === OUT OF COMBAT: matches Shaman weapon enchant pattern ===
  out_of_combat:
    - instant_poison,range_check=none,if=config.mainhand_poison=1&!buff.instant_poison.up&!player.mounted
    - deadly_poison,range_check=none,if=config.mainhand_poison=2&!buff.deadly_poison.up&!player.mounted
    - wound_poison,range_check=none,if=config.mainhand_poison=3&!buff.wound_poison.up&!player.mounted
    - crippling_poison,range_check=none,if=config.offhand_poison=1&!buff.crippling_poison.up&!player.mounted
    - numbing_poison,range_check=none,if=config.offhand_poison=2&!buff.numbing_poison.up&!player.mounted
    - atrophic_poison,range_check=none,if=config.offhand_poison=3&!buff.atrophic_poison.up&!player.mounted
    - stealth,range_check=none,if=config.auto_stealth&cooldown.stealth.ready&!player.mounted&!var.stealth_up&!player.casting

  trinkets:
    - trinket_1,if=trinket_1.ready&(buff.between_the_eyes.up|trinket_1.usable|fight_remains<=20)
    - trinket_2,if=trinket_2.ready&(buff.between_the_eyes.up|trinket_2.usable|fight_remains<=20)

  # === INTERRUPTS ===
  interrupts:
    # --- Auto-target: only fires in combat, stops the moment current target needs an interrupt ---
    - target_enemy,if=player.combat&var.any_interrupt_8y&!var.target_needs_interrupt&(var.kick_ready|var.kidney_ready|var.blind_ready)&var.auto_target

    # --- Kick: primary ---
    - kick,delay=150,if=var.target_is_kickable&var.kick_ready&target.exists&target.enemy&!target.boss

    # --- Kidney Shot: kickable OR stunnable when kick is down, no CP minimum for interrupt use ---
    - kidney_shot,if=var.target_needs_interrupt&var.kidney_ready&!var.kick_ready&target.exists&target.enemy&!target.boss&var.use_kidney

    # --- Blind: kickable OR stunnable when kick and kidney are down ---
    - blind,if=var.target_needs_interrupt&var.blind_ready&!var.kick_ready&!var.kidney_ready&target.exists&target.enemy&!target.boss&var.use_blind

    # --- Stun fallbacks ---
    - cheap_shot,if=var.target_needs_interrupt&var.subterfuge_up&combo_points<combo_points.max&target.exists&target.enemy&!target.boss
    - gouge,if=var.target_needs_interrupt&target.exists&target.enemy&!target.boss

    # --- Mouseover ---
    - kick.mouseover,if=var.mouseover_kickable&var.kick_ready&!mouseover.boss
    - kidney_shot.mouseover,if=(var.mouseover_kickable|var.mouseover_stunnable)&var.kidney_ready&!var.kick_ready&!mouseover.boss&var.use_kidney
    - blind.mouseover,if=(var.mouseover_kickable|var.mouseover_stunnable)&var.blind_ready&!var.kick_ready&!var.kidney_ready&!mouseover.boss&var.use_blind

    # --- Focus ---
    - kick.focus,if=var.focus_kickable&var.kick_ready&!focus.boss
    - kidney_shot.focus,if=(var.focus_kickable|var.focus_stunnable)&var.kidney_ready&!var.kick_ready&!focus.boss&var.use_kidney
    - blind.focus,if=(var.focus_kickable|var.focus_stunnable)&var.blind_ready&!var.kick_ready&!var.kidney_ready&!focus.boss&var.use_blind

  defensives:
    - cloak_of_shadows,if=player.combat.time>5&cooldown.cloak_of_shadows.ready&!buff.cloak_of_shadows.up&player.has_magic_debuff
    - feint,if=cooldown.feint.ready&defensives.ready.aoe
    - evasion,if=cooldown.evasion.ready&!buff.evasion.up&(defensives.ready|var.health_critical)
    - crimson_vial,if=player.health.pct<config.crimson_vial_hp&cooldown.crimson_vial.ready
    - healthstone,if=healthstone.ready&var.health_critical
    - health_potion,if=health_potion.ready&var.health_critical&!healthstone.ready

  utility:
    - sprint,if=player.moving&!player.combat&cooldown.sprint.ready&target.exists&target.alive&target.range>15
    - grappling_hook,if=talent.grappling_hook.enabled&player.moving&cooldown.grappling_hook.ready&target.range>20
    - soothe,if=talent.trickster.enabled&target.has_enrage

  # === AFFIX ABILITIES: Full burn rotation ===
  affix_abilities:
    - cloak_of_shadows,if=cooldown.cloak_of_shadows.ready&!buff.cloak_of_shadows.up&defensives.ready.magic
    - feint,if=cooldown.feint.ready&defensives.ready.aoe
    - evasion,if=cooldown.evasion.ready&!buff.evasion.up&(defensives.ready|var.health_critical)
    - crimson_vial,if=player.health.pct<config.crimson_vial_hp&cooldown.crimson_vial.ready
    - adrenaline_rush,if=!var.adrenaline_rush_up
    - blade_flurry,if=var.enemies_in_melee>=2&buff.blade_flurry.remains<gcd
    - roll_the_bones,if=!var.rtb_up
    - trinket_1,if=trinket_1.ready
    - trinket_2,if=trinket_2.ready
    - between_the_eyes,if=combo_points>=combo_points.max-1
    - dispatch,if=combo_points>=combo_points.max-1
    - ambush,if=talent.hidden_opportunity&var.audacity_up
    - pistol_shot,if=var.opportunity_up
    - ambush,if=talent.hidden_opportunity
    - sinister_strike
    - blind,if=target.name="Ascendant Orb"&target.casting&var.blind_ready

  opener:
    - adrenaline_rush,if=cooldown.adrenaline_rush.ready&var.hero_tree_trickster
    - ambush,if=combo_points<5
    - sinister_strike,if=combo_points<5

  cooldowns:
    - adrenaline_rush,if=!var.adrenaline_rush_up&(!var.finish_condition|!talent.improved_adrenaline_rush)
    - blade_flurry,if=var.enemies_in_melee>=2&buff.blade_flurry.remains<gcd
    - preparation,if=cooldown.adrenaline_rush.remains>30&!var.bte_ready&(!var.killing_spree_ready|!var.hero_tree_trickster)|fight_remains<30
    - keep_it_rolling,if=var.rtb_stage>=3
    - keep_it_rolling,if=var.rtb_stage>=config.keep_it_rolling_min_stage&var.rtb_stage<3&buff.roll_the_bones.remains<cooldown.adrenaline_rush.remains&!buff.loaded_dice.up&(cooldown.preparation.remains|!talent.preparation)
    - roll_the_bones,if=!var.rtb_up|var.rtb_stage=1
    - blade_rush,if=set_bonus.mid1_4pc&!buff.whirl_of_blades.up|var.enemies_in_melee=1&energy.time_to_max>2|var.enemies_in_melee>=2
    - vanish,if=!var.finish_condition&talent.hidden_opportunity&!var.audacity_up&!var.opportunity_up
    - shadowmeld,if=!var.finish_condition&talent.hidden_opportunity&!var.audacity_up&!var.opportunity_up
    - combat_potion,if=combat_potion.ready&(buff.bloodlust.up|fight_remains<30|var.adrenaline_rush_up)
    - blood_fury
    - berserking
    - fireblood
    - ancestral_call

  finish:
    - dispatch,if=!var.slice_and_dice_up
    - between_the_eyes,if=cooldown.adrenaline_rush.remains>30|var.adrenaline_rush_up|!talent.supercharger|!talent.zero_in
    - pool_resource,for_next=1
    - killing_spree,if=var.killing_spree_ready
    - coup_de_grace
    - dispatch

  build:
    - ambush,if=talent.hidden_opportunity&var.audacity_up
    - blade_flurry,if=talent.deft_maneuvers&var.enemies_in_melee>=4
    - coup_de_grace,if=buff.disorienting_strikes.up
    - pistol_shot,if=talent.audacity&talent.hidden_opportunity&var.opportunity_up&!var.audacity_up
    - pistol_shot,if=talent.fan_the_hammer&var.opportunity_up&(buff.opportunity.stack>=6|buff.opportunity.remains<2)
    - pistol_shot,if=talent.fan_the_hammer&var.opportunity_up&(combo_points.deficit>=(1+talent.quick_draw+(talent.quick_draw*talent.fan_the_hammer.rank))&(combo_points>1|var.rtb_stage<2|!talent.deal_fate))
    - pistol_shot,if=!talent.fan_the_hammer&var.opportunity_up&(energy.deficit>energy.regen*1.5|combo_points.deficit<=1|talent.quick_draw.enabled|talent.audacity.enabled&!var.audacity_up)
    - pool_resource,for_next=1
    - ambush,if=talent.hidden_opportunity
    - sinister_strike

  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - target_enemy,if=(!target.valid|target.range>6)&enemies.6y>=1
    - call_action_list,name=out_of_combat
    - return,if=!player.combat
    - return,if=player.channeling
    - call_action_list,name=combat_checks

    # === PRECOMBAT: RTB at 8y, AR at 6y (Trickster only) ===
    - roll_the_bones,if=!player.combat&var.stealth_up&!var.rtb_up&var.hero_tree_trickster&enemies.8y>=1
    - adrenaline_rush,if=!player.combat&var.stealth_up&cooldown.adrenaline_rush.ready&var.hero_tree_trickster&enemies.6y>=1

    # === AFFIX INTERCEPT ===
    - run_action_list,name=affix_abilities,if=player.combat&var.affix_priority_mode

    # === INTERRUPTS ===
    - call_action_list,name=interrupts

    # === DEFENSIVES ===
    - call_action_list,name=defensives,if=config.auto_defensives

    # === UTILITY ===
    - call_action_list,name=utility,if=var.target_attackable

    # === OPENER ===
    - call_action_list,name=opener,if=player.combat.time<=5&var.in_stealth

    # === CORE ROTATION ===
    - call_action_list,name=cooldowns,if=var.target_attackable
    - call_action_list,name=trinkets
    - run_action_list,name=finish,if=var.finish_condition
    - call_action_list,name=build

    # === RACIAL FILLERS ===
    - arcane_torrent,if=energy.deficit>=15+energy.regen
    - arcane_pulse
    - lights_judgment
    - bag_of_tricks
